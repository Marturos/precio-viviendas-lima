name: CI - Proyecto Final Python

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install pytest pandas numpy scikit-learn joblib PyGithub python-dotenv

      - name: Ejecutar tests locales
        run: |
          python -m pytest tests -v
